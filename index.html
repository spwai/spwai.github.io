<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particles.js Background</title>
  <!-- Include Particles.js library -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <!-- Include Stats.js library -->
  <script src="https://threejs.org/examples/js/libs/stats.min.js"></script>
  <!-- Include Poppins font from Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap">
  <!-- Include your custom styles -->
  <style>
    /* ---- reset ---- */
    body {
      margin: 0;
      font: normal 75% Arial, Helvetica, sans-serif;
    }
    canvas {
      display: block;
      vertical-align: bottom;
    }
    /* ---- particles.js container ---- */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #232741;
      background-image: url("");
      background-repeat: no-repeat;
      background-size: 20%;
      background-position: 50% 50%;
    }
    /* ---- stats.js ---- */
    #stats {
      border-radius: 3px 3px 0 0;
      overflow: hidden;
      position: absolute;
      top: 0;
      left: 0;
    }
    /* ---- Custom Title Styles ---- */
    .title-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: 'Poppins', sans-serif; /* Use the Poppins font */
      font-size: 3em;
      color: #ffffff; /* White text color */
      cursor: pointer;
      transition: color 0.3s ease-in-out;
    }
    .title-container:hover {
      color: #13E8E9; /* Change to your desired hover color */
    }
    .loading-animation {
      display: inline-block;
      margin-left: 10px; /* Adjust the spacing as needed */
    }
    .loading-animation div {
      width: 8px;
      height: 8px;
      background-color: #ffffff;
      border-radius: 50%;
      display: inline-block;
      animation: loadingAnimation 0.8s infinite alternate;
    }
    @keyframes loadingAnimation {
      to {
        transform: translateY(-15px);
        background-color: #13E8E9; /* Change to your desired loading color */
      }
    }
  </style>
</head>
<body>

  <!-- particles.js container -->
  <div id="particles-js"></div>

  <!-- Include Particles.js configuration script -->
  <script>
    particlesJS('particles-js', {
      "particles": {
        // ... (Your existing particles configuration)
      },
      "interactivity": {
        // ... (Your existing interactivity configuration)
      },
      "retina_detect": true
    });

    var stats = new Stats();
    stats.setMode(0);
    stats.domElement.style.position = 'absolute';
    stats.domElement.style.left = '0px';
    stats.domElement.style.top = '0px';
    document.body.appendChild(stats.domElement);

    function update() {
      stats.begin();
      stats.end();
      requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
  </script>

  <!-- Your custom title and loading animation -->
  <div class="title-container">
    spwai
    <div class="loading-animation">
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <!-- Your other HTML content goes here -->

</body>
</html>
