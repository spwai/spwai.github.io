<!DOCTYPE html>
<html>
    <head>
        <style> body {overflow: hidden; margin: 0px; } </style>
        <script type="module" src="./js/three/three.module.js"></script>
        <script type="module" src="./js/vanta.net.js"></script>
    </head>
    <body style="overflow: hidden; margin: 0px;">
    <div id="vanta-bg" style="height:100vh"></div>
    <script type="module"> 
        import VANTA from './jsm/vanta.net.js';
         VANTA.NET({
                el: "#vanta-bg",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                color: 0xff8900,
                backgroundColor: 0x001b140b,
                points: 8.00,
                maxDistance: 27.00,
                spacing: 20.00
            })
    </script>
</body>
</html>
