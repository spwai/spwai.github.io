<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <style>
    body,
    html {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #vanta-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1; /* Set a lower z-index for the background */
    }

    #panel-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .panel {
      background-color: rgba(255, 255, 255, 0.9); /* Semi-transparent light gray panel background color */
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      transform: scale(1);
      transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
      overflow: hidden;
    }

    .panel:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    .panel h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .panel p {
      font-size: 18px;
      color: #555;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.22/dist/vanta.net.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Disable zoom on PC
      document.addEventListener('wheel', function (e) {
        if (e.ctrlKey) {
          e.preventDefault();
        }
      });

      VANTA.NET({
        el: "#vanta-container",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
      });
    });
  </script>
</head>

<body>
  <div id="vanta-container"></div>
  
  <div id="panel-container">
    <div class="panel">
      <!-- Content for the panel -->
      <h2>Panel Title</h2>
      <p>Panel content goes here.</p>
    </div>
  </div>
</body>

</html>
