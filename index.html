<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>xmm0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
            height: 100vh;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 24px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #f0f6fc;
        }

        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            color: #8b949e;
        }

        .btn {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        .btn:active {
            background-color: #1f6feb;
            border-color: #1f6feb;
        }

        .btn-secondary {
            background-color: #238636;
            border-color: #238636;
        }

        .btn-secondary:hover {
            background-color: #2ea043;
            border-color: #2ea043;
        }

        .info {
            font-size: 12px;
            color: #8b949e;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 12px;
            max-width: 300px;
        }

        .graph-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .legend {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            z-index: 1000;
            min-width: 200px;
            user-select: none;
        }

        .legend h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f0f6fc;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid #30363d;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            z-index: 2000;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #30363d;
            border-top: 2px solid #1f6feb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }

            .header h1 {
                font-size: 16px;
            }

            .controls {
                gap: 8px;
            }

            .control-group {
                gap: 4px;
            }

            .btn {
                padding: 4px 8px;
                font-size: 12px;
            }

            .legend {
                bottom: 8px;
                right: 8px;
                padding: 12px;
                min-width: 160px;
            }
        }
    </style>
</head>

<body>
    <div id="graph-container" class="graph-container"></div>
    <div class="legend">
        <h3>Legend</h3>
        <div class="legend-item">
            <div class="legend-dot" style="background-color: #f54254;"></div>
            <span>Target</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background-color: #ffffff;"></div>
            <span>Worker</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background-color: #161c26;"></div>
            <span>Default</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background-color: #2f353d;"></div>
            <span>Unspecified</span>
        </div>
    </div>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Loading visualization...</div>
    </div>
    <script type="module" src="index.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
            }, 1000);
        });
    </script>
    <script disable-devtool-auto disable-menu="true" disable-select="true" disable-copy="true" disable-paste="true"
        src="https://cdn.jsdelivr.net/npm/disable-devtool"></script>
    <script>
        window.addEventListener('wheel', function (e) {
            if (e.ctrlKey) e.preventDefault();
        }, { passive: false });

        window.addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && ['+', '-', '0', '='].includes(e.key)) {
                e.preventDefault();
            }
        });
        window.addEventListener('touchmove', function (e) {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>

</html>
