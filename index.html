<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANTA.js Dots Background</title>
  <!-- Include VANTA.js library -->
  <script src="three.r134.min.js"></script>
<script src="vanta.dots.min.js"></script>
</head>
<body>
  <script>
    // Initialize VANTA.js dots background
    VANTA.DOTS({
      el: 'body', // Target the entire body as the container
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.0,
      minWidth: 200.0,
      scale: 1.0,
      scaleMobile: 1.0,
      color: 0x313338, // Specify color without #
      color2: 0x0,     // Specify color without #
      backgroundColor: 0x1e1f22, // Specify color without #
      showLines: false
    });
  </script>
</body>
</html>
