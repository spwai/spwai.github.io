<!doctype html>
<html>
   <title>spwai</title>
   <link href='https://fonts.googleapis.com/css?family=JetBrains Mono' rel='stylesheet'>
   <meta charset="utf-8">
   <link rel="stylesheet" href="styles.css">
   <script src="three.r134.min.js"></script>
   <script src="vanta.net.min.js"></script>
   <body style="overflow: hidden; margin: 0px;">
      <div id="vanta-bg" style="height:100vh"></div>
      <script type="module"> 
         import VANTA from './jsm/vanta.net.js';
         VANTA({
              el: "#vanta-bg",
         mouseControls: true,
         touchControls: true,
         gyroControls: false,
         minHeight: 200.00,
         minWidth: 200.00,
         scale: 1.00,
         scaleMobile: 1.00,
         color: 0x#ff0044,
         maxDistance: 25.00
         })
      </script>
   </body>
</html>
