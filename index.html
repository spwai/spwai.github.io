<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Particles.js Background</title>
  <!-- Include Particles.js library -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <!-- Include Stats.js library -->
  <script src="https://threejs.org/examples/js/libs/stats.min.js"></script>
  <!-- Include your custom styles -->
  <style>
    /* ---- reset ---- */
    body {
      margin: 0;
      font: normal 75% Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column; /* Adjusted to a column layout */
      height: 100vh;
      background-color: #2C3E50; /* Set the background color to a modern shade */
    }
    canvas {
      display: block;
      vertical-align: bottom;
    }
    /* ---- particles.js container ---- */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #2C3E50;
      background-image: url("");
      background-repeat: no-repeat;
      background-size: 20%;
      background-position: 50% 50%;
      z-index: 1;
    }
    /* ---- Custom text style ---- */
    #custom-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3em;
      font-weight: bold;
      color: #ffffff;
      z-index: 2;
      margin-bottom: 20px; /* Added margin at the bottom */
      transition: transform 0.3s ease-in-out, letter-spacing 0.3s ease-in-out;
    }
    /* Hover effects */
    #custom-text:hover {
      transform: scale(1.2); /* Scale up on hover */
      letter-spacing: 4px; /* Increase letter spacing on hover */
    }
    /* ---- YouTube link boxes ---- */
    .link-box {
      display: flex;
      align-items: center;
      margin: 10px;
      padding: 15px;
      border-radius: 15px;
      background-color: #3498db; /* Contrasting color */
      color: #ffffff;
      text-decoration: none;
      font-family: 'Arial', sans-serif;
      transition: background-color 0.3s ease-in-out;
    }
    .link-box:hover {
      background-color: #2980b9; /* Darker color on hover */
    }
    .link-box img {
      width: 30px;
      margin-right: 10px;
    }
  </style>
  <!-- Include Jetbrains Mono font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap">
</head>
<body>

  <!-- particles.js container -->
  <div id="particles-js"></div>

  <!-- Custom text -->
  <div id="custom-text">Spwai</div>

  <!-- YouTube link boxes -->
  <a href="https://www.youtube.com/@spwaii" class="link-box" target="_blank">
    <img src="https://www.gstatic.com/webp/gallery/2.jpg" alt="YouTube Logo">
    Visit My YouTube Channel
  </a>

  <!-- Include Particles.js configuration script -->
  <script>
    particlesJS('particles-js', {
      "particles": {
        "number": {
          "value": 160,
          "density": {
            "enable": true,
            "value_area": 800
          }
        },
        "color": {
          "value": "#ffffff"
        },
        "shape": {
          "type": "circle",
          "stroke": {
            "width": 0,
            "color": "#000000"
          },
          "polygon": {
            "nb_sides": 5
          }
        },
        "opacity": {
          "value": 1,
          "random": true,
          "anim": {
            "enable": true,
            "speed": 1,
            "opacity_min": 0,
            "sync": false
          }
        },
        "size": {
          "value": 3,
          "random": true,
          "anim": {
            "enable": false,
            "speed": 4,
            "size_min": 0.3,
            "sync": false
          }
        },
        "line_linked": {
          "enable": false,
          "distance": 150,
          "color": "#ffffff",
          "opacity": 0.4,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 1,
          "direction": "none",
          "random": true,
          "straight": false,
          "out_mode": "out",
          "bounce": false,
          "attract": {
            "enable": false,
            "rotateX": 600,
            "rotateY": 600
          }
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": {
            "enable": false,
            "mode": "repulse"
          },
          "onclick": {
            "enable": false,
            "mode": "repulse"
          },
          "resize": true
        },
        "modes": {
          "grab": {
            "distance": 400,
            "line_linked": {
              "opacity": 1
            }
          },
          "bubble": {
            "distance": 250,
            "size": 0,
            "duration": 2,
            "opacity": 0,
            "speed": 3
          },
          "repulse": {
            "distance": 400,
            "duration": 0.4
          },
          "push": {
            "particles_nb": 4
          },
          "remove": {
            "particles_nb": 2
          }
        }
      },
      "retina_detect": true
    });

    var stats = new Stats();
    stats.setMode(0);
    stats.domElement.style.position = 'absolute';
    stats.domElement.style.left = '0px';
    stats.domElement.style.top = '0px';
    document.body.appendChild(stats.domElement);

    function update() {
      stats.begin();
      stats.end();
      requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
  </script>

  <!-- Your other HTML content goes here -->

</body>
</html>
