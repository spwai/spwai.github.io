<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <style>
    body,
    html {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #vanta-container {
      width: 100%;
      height: 100%;
      transform-origin: 0 0;
      transition: transform 0.5s ease-in-out;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.22/dist/vanta.net.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
  <script>
    var scale = 1.0;

    function handlePinch(event) {
      event.preventDefault();

      if (event.scale < 1.0) {
        // Zoom out
        scale *= 1 - event.scale / 100; // Adjust the scale factor as needed
      } else {
        // Zoom in (if needed)
        // You can handle zoom in behavior here
      }

      document.getElementById('vanta-container').style.transform = 'scale(' + scale + ')';
    }

    document.addEventListener('DOMContentLoaded', function () {
      // Disable zoom on PC
      document.addEventListener('wheel', function (e) {
        if (e.ctrlKey) {
          e.preventDefault();
        }
      });

      // Initialize Hammer.js
      var hammer = new Hammer(document.getElementById('vanta-container'));

      // Handle pinch-to-zoom using Hammer.js
      hammer.get('pinch').set({ enable: true });
      hammer.on('pinch', handlePinch);

      VANTA.NET({
        el: "#vanta-container",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
      });
    });
  </script>
</head>

<body>
  <div id="vanta-container"></div>
</body>

</html>
