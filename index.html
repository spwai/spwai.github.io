<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <style>
    body,
    html {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #vanta-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1; /* Set a lower z-index for the background */
    }

    #panel-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 9fr);
      grid-gap: 30px;
      justify-content: center;
      align-items: center;
      height: 80vh;
      padding: 10% 5% 0 5%;
    }

    .panel {
      background-color: rgb(52, 53, 65);
      padding: 120px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      transform: scale(1);
      transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
      overflow: hidden;
      color: white;
      font-family: 'Poppins', sans-serif;
      height: 40vh;
      width: 30vh;
    }

    .panel:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    .panel h2 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .panel p {
      font-size: 24px;
      color: #ccc;
    }
  </style>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
 <script src="three.r134.min.js"></script>
<script src="vanta.dots.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Disable zoom on PC
    document.addEventListener('wheel', function (e) {
      if (e.ctrlKey) {
        e.preventDefault();
      }
    });

    VANTA.DOTS({
      el: "#vanta-container",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.0,
      minWidth: 200.0,
      scale: 1.0,
      scaleMobile: 1.0,
      color: 0x313338,            // Removed '#' symbol
      backgroundColor: 0x1e1f22,  // Removed '#' symbol
      showLines: false
    });
  });
</script>

</head>

<body>
  <div id="vanta-container"></div>

  <div id="panel-container">
    <div class="panel">
      <!-- Content for the panel -->
      <h2>Panel Title 1</h2>
      <p>Panel content goes here.</p>
    </div>
    <div class="panel">
      <!-- Content for the panel -->
      <h2>Panel Title 2</h2>
      <p>Panel content goes here.</p>
    </div>
    <div class="panel">
      <!-- Content for the panel -->
      <h2>Panel Title 3</h2>
      <p>Panel content goes here.</p>
    </div>
    <div class="panel">
      <!-- Content for the panel -->
      <h2>Panel Title 4</h2>
      <p>Panel content goes here.</p>
    </div>
  </div>
</body>

</html>
