<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spwai</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #d1ebf6;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .profile-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            background: rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            text-align: center;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .profile-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .profile-card h1 {
            font-size: 1.5em;
            color: white;
            margin: 0;
        }

        .icon-container {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .icon-container a {
            margin: 0 10px;
            text-decoration: none;
            transition: transform 0.3s ease; /* Add smooth scaling transition */
        }

        .icon-container a:hover {
            transform: scale(1.1); /* Slight scaling effect */
        }

        .icon-container i {
            font-size: 1.5em;
            color: white;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="particles-js"></div>

    <div class="profile-card">
        <img src="pfp.jpg" alt="Profile Picture">
        <h1>Spwai</h1>
        <div class="icon-container">
            <a href="https://github.com/spwai" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.xbox.com/en-US/play/user/spwai" target="_blank"><i class="fab fa-xbox"></i></a>
            <a href="" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="https://youtube.com/@spwai" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <script>
        /* Load particles.js with a custom configuration */
        particlesJS.load('particles-js', 'particles.json', function() {
            console.log('particles.js config loaded');
        });
    </script>
</body>
</html>
