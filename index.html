<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spwai</title>
  <!-- Include Particles.js library -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <!-- Include Stats.js library -->
  <script src="https://threejs.org/examples/js/libs/stats.min.js"></script>
  <!-- Include your custom styles -->
  <style>
    /* ---- reset ---- */
    body {
      margin: 0;
      font: normal 75% Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #2C3E50; /* Set the background color to a modern shade */
    }
    canvas {
      display: block;
      vertical-align: bottom;
    }
    /* ---- particles.js container ---- */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #2C3E50;
      background-image: url("");
      background-repeat: no-repeat;
      background-size: 20%;
      background-position: 50% 50%;
      z-index: 1;
    }
    /* ---- Custom text style ---- */
    #custom-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3em;
      font-weight: bold;
      color: #ffffff;
      z-index: 2;
      transition: transform 0.3s ease-in-out, letter-spacing 0.3s ease-in-out;
    }
    /* Hover effects */
    #custom-text:hover {
      transform: scale(1.2); /* Scale up on hover */
      letter-spacing: 4px; /* Increase letter spacing on hover */
    }
    /* ---- Custom boxes ---- */
    .box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background-color: #3498db; /* Contrasting color */
      color: #ffffff;
      text-align: center;
      font-family: 'Arial', sans-serif;
      text-decoration: none;
      display: inline-block;
      margin-right: 10px;
    }
    .box:hover {
      background-color: #2980b9; /* Darker shade on hover */
    }
  </style>
  <!-- Include Jetbrains Mono font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap">
</head>
<body>

  <!-- particles.js container -->
  <div id="particles-js"></div>

  <!-- Custom text -->
  <div id="custom-text">Spwai</div>

  <!-- Custom boxes with links -->
  <div class="box">
    <a href="https://www.youtube.com/@spwaii" target="_blank" rel="noopener noreferrer">
      <img src="https://img.icons8.com/ios-glyphs/30/ffffff/youtube-play.png" alt="YouTube Icon" />
      YouTube
    </a>
  </div>

  <!-- Include Particles.js configuration script -->
  <script>
    particlesJS('particles-js', {
      "particles": {
        "number": {
          "value": 160,
          "density": {
            "enable": true,
            "value_area": 800
          }
        },
        // Rest of your particles configuration here
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": {
            "enable": false,
            "mode": "repulse"
          },
          "onclick": {
            "enable": false,
            "mode": "repulse"
          },
          "resize": true
        },
        // Rest of your interactivity configuration here
      },
      "retina_detect": true
    });

    var stats = new Stats();
    stats.setMode(0);
    stats.domElement.style.position = 'absolute';
    stats.domElement.style.left = '0px';
    stats.domElement.style.top = '0px';
    document.body.appendChild(stats.domElement);

    function update() {
      stats.begin();
      stats.end();
      requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
  </script>

  <!-- Your other HTML content goes here -->

</body>
</html>
