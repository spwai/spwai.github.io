<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Website Title</title>
  <!-- Add the required scripts -->
  <script src="three.r134.min.js"></script>
  <script src="vanta.dots.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    #your-element-selector {
      height: 100vh; /* Set the height to fill the viewport */
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>

<!-- Your HTML content goes here -->

<!-- Add an element with the specified selector for the VANTA.DOTS background -->
<div id="your-element-selector">
  <!-- Your content inside this element will be affected by the background -->
  <h1>Welcome to Your Website</h1>
  <p>This is a placeholder text. Replace it with your actual content.</p>
  <!-- Add more content as needed -->
</div>

<!-- Initialize VANTA.DOTS with the specified configuration -->
<script>
  VANTA.DOTS({
    el: "#your-element-selector",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200.00,
    minWidth: 200.00,
    scale: 1.00,
    scaleMobile: 1.00,
    color: 0x313338,
    color2: 0x0,
    backgroundColor: 0x1e1f22,
    showLines: false
  });
</script>

</body>
</html>
