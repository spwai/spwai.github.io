<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packs :3</title>
    <link rel="icon" href="../icon.png" type="image/x-icon">

    <!-- Open Graph Metadata for Discord Embed -->
    <meta property="og:title" content="Packs :3" />

    <!-- Google Font for better loading -->
    <link href="https://fonts.googleapis.com/css2?family=Arial:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool'></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #d1ebf6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-wrap: wrap;
            font-family: 'Arial', sans-serif; /* Use the correct font */
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* Centered Download Button Styling */
        .download-btn {
            padding: 10px 20px;
            background-color: white;
            opacity: 0.7;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s ease, opacity 0.3s ease; /* Transition for scaling */
            text-align: center;
        }

        .download-btn:hover {
            transform: scale(1.1); /* Slightly expand on hover */
        }

        /* Disable text selection */
        * {
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <!-- Download Button Section -->
    <a id="download-button" class="download-btn" href="#" style="pointer-events: none;">Download (5)</a>

    <script>
        // Ensure particles.js is loaded first and runs smoothly
        particlesJS.load('particles-js', '../particles.json', function() {
            console.log('particles.js config loaded');
        });

        // Set up the download functionality
        const downloadButton = document.getElementById('download-button');
        const fileHash = window.location.hash.substring(1); // Get the part after '#'

        if (!fileHash) {
            downloadButton.textContent = "Invalid download link";
            return; // Stop if no valid hash is present
        }

        const fileUrl = fileHash; // Directly use the hash part as the file name (e.g., ffa.zip)

        let countdown = 5;
        const interval = setInterval(function() {
            downloadButton.textContent = `Download (${countdown})`;
            countdown--;

            if (countdown < 0) {
                clearInterval(interval);
                downloadButton.textContent = 'Click to Download';
                downloadButton.style.cursor = 'pointer';
                downloadButton.style.pointerEvents = 'auto'; // Enable clicking
                downloadButton.setAttribute('href', fileUrl); // Set the file URL for download
            }
        }, 1000);
    </script>
</body>
</html>
