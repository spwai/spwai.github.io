<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packs :3</title>
    <link rel="icon" href="../icon.png" type="image/x-icon">

    <!-- Open Graph Metadata for Discord Embed -->
    <meta property="og:title" content="Packs :3" />

    <!-- Google Font for better loading -->
    <link href="https://fonts.googleapis.com/css2?family=Arial:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool'></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #d1ebf6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-wrap: wrap;
            font-family: 'Arial', sans-serif; /* Use the correct font */
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* Centered Download Button Styling */
        .download-btn {
            padding: 10px 20px;
            background-color: white;
            opacity: 0.7;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s ease, opacity 0.3s ease; /* Transition for scaling */
            text-align: center;
        }

        .download-btn:hover {
            transform: scale(1.1); /* Slightly expand on hover */
        }

        /* Disable text selection */
        * {
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <!-- Download Button Section -->
    <div class="download-btn" id="download-button">Download (5)</div>

    <script>
        // Get the download button element
        const downloadButton = document.getElementById('download-button');
        const fileUrl = window.location.hash === '#ffa.zip' ? 'https://spwai.github.io/packs/download.html#ffa.zip' : 'https://spwai.github.io/packs/download.html#ui.zip';

        let countdown = 5;
        const interval = setInterval(function() {
            downloadButton.textContent = `Download (${countdown})`;
            countdown--;
            if (countdown < 0) {
                clearInterval(interval);
                downloadButton.textContent = 'Click to Download';
                downloadButton.style.cursor = 'pointer';
                downloadButton.addEventListener('click', function() {
                    window.location.href = fileUrl;
                });
            }
        }, 1000);

        /* Load particles.js with a custom configuration */
        particlesJS.load('particles-js', '../particles.json', function() {
            console.log('particles.js config loaded');
        });
    </script>
</body>
</html>
