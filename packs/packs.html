<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Carousel</title>
    <link rel="icon" href="icon.png" type="image/x-icon">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #d1ebf6;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #carousel-container {
            width: 90%;
            max-width: 1400px;
            overflow: hidden;
            position: relative;
        }

        #carousel {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .card {
            min-width: 25%; /* 4 cards visible */
            margin: 0 10px;
            text-align: center;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transform: scale(0.9); /* Smaller for off-screen effect */
            opacity: 0.7; /* Slightly faded when off-screen */
            transition: transform 0.3s ease, opacity 0.3s ease, background-color 0.3s ease;
        }

        .card.active {
            transform: scale(1); /* Normal size for visible cards */
            opacity: 1;
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .card h2 {
            font-size: 1.5em;
            color: #333;
            margin: 10px 0;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: white;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s ease, background-color 0.3s ease, color 0.3s ease;
        }

        .download-btn:hover {
            transform: scale(1.1);
            background-color: #a8dff0; /* Light Cinnamoroll blue */
            color: white;
        }

        /* Navigation Arrows */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5em;
            color: #333;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.7);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease;
            z-index: 10;
        }

        .arrow:hover {
            background-color: #f1c40f;
            color: white;
        }

        .arrow-left {
            left: 10px;
        }

        .arrow-right {
            right: 10px;
        }
    </style>
</head>
<body>
    <div id="carousel-container">
        <!-- Left Arrow -->
        <button class="arrow arrow-left" onclick="shiftCarousel(-1)">‹</button>

        <!-- Carousel -->
        <div id="carousel">
            <!-- Cards -->
            <div class="card active">
                <img src="pack1.jpg" alt="Pack 1">
                <h2>Pack Title 1</h2>
                <a href="pack1.zip" class="download-btn">Download →</a>
            </div>
            <div class="card active">
                <img src="pack2.jpg" alt="Pack 2">
                <h2>Pack Title 2</h2>
                <a href="pack2.zip" class="download-btn">Download →</a>
            </div>
            <div class="card">
                <img src="pack3.jpg" alt="Pack 3">
                <h2>Pack Title 3</h2>
                <a href="pack3.zip" class="download-btn">Download →</a>
            </div>
            <div class="card">
                <img src="pack4.jpg" alt="Pack 4">
                <h2>Pack Title 4</h2>
                <a href="pack4.zip" class="download-btn">Download →</a>
            </div>
            <div class="card">
                <img src="pack5.jpg" alt="Pack 5">
                <h2>Pack Title 5</h2>
                <a href="pack5.zip" class="download-btn">Download →</a>
            </div>
            <div class="card">
                <img src="pack6.jpg" alt="Pack 6">
                <h2>Pack Title 6</h2>
                <a href="pack6.zip" class="download-btn">Download →</a>
            </div>
            <div class="card">
                <img src="pack7.jpg" alt="Pack 7">
                <h2>Pack Title 7</h2>
                <a href="pack7.zip" class="download-btn">Download →</a>
            </div>
            <div class="card">
                <img src="pack8.jpg" alt="Pack 8">
                <h2>Pack Title 8</h2>
                <a href="pack8.zip" class="download-btn">Download →</a>
            </div>
        </div>

        <!-- Right Arrow -->
        <button class="arrow arrow-right" onclick="shiftCarousel(1)">›</button>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const cards = document.querySelectorAll('.card');
        const totalCards = 8; // Total number of cards
        const visibleCards = 4; // Number of cards visible at a time
        let currentIndex = 0; // Index of the first visible card

        // Function to shift the carousel
        function shiftCarousel(direction) {
            currentIndex += direction;

            // Prevent scrolling out of bounds
            if (currentIndex < 0) {
                currentIndex = 0;
            } else if (currentIndex > totalCards - visibleCards) {
                currentIndex = totalCards - visibleCards;
            }

            // Update carousel transform
            const translateX = -(currentIndex * (100 / visibleCards));
            carousel.style.transform = `translateX(${translateX}%)`;

            // Update active card classes for blur/opacity
            cards.forEach((card, index) => {
                if (index >= currentIndex && index < currentIndex + visibleCards) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        }
    </script>
</body>
</html>
