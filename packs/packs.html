<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Card Example</title>
    <link rel="icon" href="icon.png" type="image/x-icon">

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #d1ebf6;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .pack-card {
            position: relative;
            width: 300px;
            height: 400px; /* Reduced height */
            background: rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 1;
        }

        .pack-card h2 {
            margin: 0;
            font-size: 1.5em;
            color: #333;
        }

        .pack-card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 15px 0;
            flex-grow: 1;
        }

        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: white;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s ease, background-color 0.3s ease;
            align-self: center;
            margin-top: auto; /* Ensure it stays at the bottom */
        }

        .download-btn:hover {
            transform: scale(1.1);
            background-color: #d1ebf6; /* Fade to background color */
            color: white;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>

    <!-- Pack Card -->
    <div class="pack-card">
        <h2>FFA</h2>
        <img src="ffa.jpg" alt="Pack Image">
        <a href="pack-download-link.zip" class="download-btn">Download →</a>
    </div>

   <script>
        /* Load particles.js with a custom configuration */
        particlesJS.load('particles-js', '../particles.json', function() {
            console.log('particles.js config loaded');
        });
    </script>
</body>
</html>
