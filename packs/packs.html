<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packs :3</title>
    <link rel="icon" href="icon.png" type="image/x-icon">

    <!-- Open Graph Metadata for Discord Embed -->
    <meta property="og:title" content="Packs :3" />

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #d1ebf6;
            font-family: Arial, sans-serif;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .carousel {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 80vh;
        }

        .card {
            flex: 0 0 15%;
            max-height: 60%;
            height: 100%;
            margin: 0 10px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transform: scale(0.8);
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0.6;
        }

        .card.active {
            transform: scale(1);
            opacity: 1;
        }

        .card img {
            width: 100%;
            height: 70%;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            object-fit: cover;
        }

        .card .title {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .card button {
            display: block;
            margin: 10px auto;
            padding: 10px 20px;
            background: white;
            border: 2px solid #d1ebf6;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .card button:hover {
            background: #d1ebf6;
            transform: scale(1.1);
        }

        .arrow {
            position: absolute;
            top: 50%;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .arrow:hover {
            background: #d1ebf6;
        }

        .arrow.left {
            left: 20px;
            transform: translateY(-50%);
        }

        .arrow.right {
            right: 20px;
            transform: translateY(-50%);
        }

        .arrow i {
            font-size: 1.5em;
        }

        @keyframes fade {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .fade {
            animation: fade 0.5s;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="carousel">
        <div class="arrow left" onclick="shiftLeft()"><i class="fas fa-chevron-left"></i></div>

        <div class="card" id="card-8">
            <img src="pack8.jpg" alt="Pack 8">
            <div class="title">Pack Title 8</div>
            <button>Download →</button>
        </div>
        <div class="card" id="card-1">
            <img src="pack1.jpg" alt="Pack 1">
            <div class="title">Pack Title 1</div>
            <button>Download →</button>
        </div>
        <div class="card active" id="card-2">
            <img src="pack2.jpg" alt="Pack 2">
            <div class="title">Pack Title 2</div>
            <button>Download →</button>
        </div>
        <div class="card" id="card-3">
            <img src="pack3.jpg" alt="Pack 3">
            <div class="title">Pack Title 3</div>
            <button>Download →</button>
        </div>
        <div class="card" id="card-4">
            <img src="pack4.jpg" alt="Pack 4">
            <div class="title">Pack Title 4</div>
            <button>Download →</button>
        </div>
        <div class="card" id="card-5">
            <img src="pack5.jpg" alt="Pack 5">
            <div class="title">Pack Title 5</div>
            <button>Download →</button>
        </div>
        <div class="card" id="card-6">
            <img src="pack6.jpg" alt="Pack 6">
            <div class="title">Pack Title 6</div>
            <button>Download →</button>
        </div>
        <div class="card" id="card-7">
            <img src="pack7.jpg" alt="Pack 7">
            <div class="title">Pack Title 7</div>
            <button>Download →</button>
        </div>

        <div class="arrow right" onclick="shiftRight()"><i class="fas fa-chevron-right"></i></div>
    </div>

    <script>
        let cards = document.querySelectorAll(".card");
        let currentIndex = 1;

        function shiftLeft() {
            const lastCard = cards[cards.length - 1];
            document.querySelector(".carousel").insertBefore(lastCard, cards[0]);
            cards = document.querySelectorAll(".card");
        }

        function shiftRight() {
            const firstCard = cards[0];
            document.querySelector(".carousel").appendChild(firstCard);
            cards = document.querySelectorAll(".card");
        }

        particlesJS.load('particles-js', 'particles.json', function() {
            console.log('particles.js config loaded');
        });
    </script>
</body>
</html>
