<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packs :3</title>
    <link rel="icon" href="../icon.png" type="image/x-icon">

    <!-- Open Graph Metadata for Discord Embed -->
    <meta property="og:title" content="Packs :3" />

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool'></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #d1ebf6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-wrap: wrap;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* Profile Card Styling */
        .profile-card {
            position: relative;
            width: 250px;
            margin: 30px;
            background: rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            text-align: center;
            padding: 20px;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: scale(1.05);
        }

        .profile-card img {
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .profile-card h1 {
            font-size: 1.5em;
            color: white;
            margin: 0;
            margin-bottom: 15px;
        }

        /* Download Button Styling */
        .download-btn {
            padding: 10px 20px;
            background-color: white;
            opacity: 0.7;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            align-self: center;
            transition: transform 0.3s ease, background-color 0.3s ease, opacity 0.3s ease;
            margin-top: auto;
        }

        .download-btn:hover {
            background-color: #d1ebf6;
            color: #fff;
        }

        /* Disable text selection */
        * {
            user-select: none;
        }

        /* Circular Back Button Styling */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background-color: white;
            color: #333;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #d1ebf6;
            transform: scale(1.1); /* Slight scaling on hover */
        }

        .back-btn:active {
            transform: scale(0.95); /* Shrink effect on click */
        }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="particles-js"></div>

    <!-- Back Button -->
    <a href="https://spwai.github.io" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- First Pack Card -->
    <div class="profile-card">
        <h1>FFA</h1>
        <a href="ffa.zip" class="download-btn">Download →</a>
    </div>

    <!-- Second Pack Card -->
    <div class="profile-card">
        <h1>UI</h1>
        <a href="ui.zip" class="download-btn">Download →</a>
    </div>

    <script>
        particlesJS.load('particles-js', '../particles.json', function() {
            console.log('particles.js config loaded');
        });
    </script>
</body>
</html>
