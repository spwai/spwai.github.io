<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packs :3</title>
    <link rel="icon" href="../icon.png" type="image/x-icon">

    <!-- Open Graph Metadata for Discord Embed -->
    <meta property="og:title" content="Packs :3" />

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool'></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #d1ebf6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-wrap: wrap;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* Profile Card Styling */
        .profile-card {
            position: relative;
            width: 250px;
            margin: 30px; /* Increased space between cards */
            background: rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            text-align: center;
            padding: 20px;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Ensures items are spaced correctly */
            transition: transform 0.3s ease; /* Scaling effect for the card */
        }

        .profile-card:hover {
            transform: scale(1.05); /* Slight scaling on hover */
        }

        .profile-card img {
            border-radius: 15px; /* Slightly rounded corners for images */
            margin-bottom: 15px;
        }

        .profile-card h1 {
            font-size: 1.5em;
            color: white;
            margin: 0;
            margin-bottom: 15px; /* Space between title and image */
        }

        /* Download Button Styling */
        .download-btn {
            padding: 10px 20px;
            background-color: white; /* Start white */
            opacity: 0.7;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            align-self: center;
            transition: transform 0.3s ease, background-color 0.3s ease, opacity 0.3s ease; /* Added fade effect */
            margin-top: auto; /* Push the button to the bottom */
        }

        .download-btn:hover {
            background-color: #d1ebf6; /* Fade to the background color */
            color: #fff; /* Change the text color to dark */
        }

        /* Disable text selection */
        * {
            user-select: none;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="particles-js"></div>

    <!-- First Pack Card -->
    <div class="profile-card">
        <h1>FFA</h1>
        <a href="https://spwai.github.io/packs/download.html#ffa.zip" class="download-btn">Download →</a>
    </div>

    <!-- Second Pack Card -->
    <div class="profile-card">
        <h1>UI</h1>
        <a href="https://spwai.github.io/packs/download.html#ui.zip" class="download-btn">Download →</a>
    </div>

    <script>
        /* Load particles.js with a custom configuration */
        particlesJS.load('particles-js', '../particles.json', function() {
            console.log('particles.js config loaded');
        });
    </script>
</body>
</html>
